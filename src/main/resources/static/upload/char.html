<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body style="height: 100vh; width: 100vw;">
    <div id="myDiv"></div>
    <script>
        var trace1 = {
            x: [0, 1, 1, 0, 0, 1, 1, 0],
            y: [0, 0, 1, 1, 0, 0, 1, 1],
            z: [0, 0, 0, 0, 1, 1, 1, 1],
            i: [0, 0, 0, 4, 4, 4, 4, 4, 1, 2, 3, 0],
            j: [1, 2, 3, 2, 3, 0, 1, 2, 5, 5, 5, 5],
            k: [2, 3, 1, 1, 2, 5, 6, 6, 6, 6, 6, 2],
            type: "mesh3d"
        };

        var data = [trace1];

        var layout = {
            title: "Interfface - Base State",
            scene: {
                aspectmode: "cube"
            }
        };

        Plotly.newPlot('myDiv', data, layout);
    </script>
</body>
</html>
